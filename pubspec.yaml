name: tume_ride_passenger
description: Tume Ride Passenger App - Ride Hailing in Kenya
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_polyline_points: ^2.0.0

  # Networking
  dio: ^5.3.2
  retrofit: ^4.0.1
  json_annotation: ^4.8.1
  socket_io_client: ^2.0.1
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  local_auth: ^2.1.7

  # Payment
  mpesa_flutter_plugin: ^1.0.0

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.0
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.0
  share_plus: ^7.2.1
  clipboard: ^0.1.3
  logging: ^1.2.0
  pinput: ^3.0.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.0

dependency_overrides:
  http: ^1.1.0
  intl: ^0.18.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
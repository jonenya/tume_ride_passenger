name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'
      
      - name: Fix theme files
        run: |
          sed -i 's/CardThemeData(/const CardTheme(/g' lib/themes/light_theme.dart || true
          sed -i 's/CardThemeData(/const CardTheme(/g' lib/themes/dark_theme.dart || true
      
      - run: flutter clean
      - run: flutter pub get
      - run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tume-ride-apk
          path: build/app/outputs/flutter-apk/*.apk

<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- Google Maps API with Geocoding -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBAsxRsUOZzuGqkKT9ANtCHOIQqmGyqkJY&libraries=places,geocoding"></script>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">

  <!-- CORS Fix for API calls -->
  <script>
    // Override fetch to handle CORS
    (function() {
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        options = options || {};
        options.mode = 'cors';
        options.credentials = 'omit';
        return originalFetch(url, options);
      };
    })();
  </script>
</head>

</body>
